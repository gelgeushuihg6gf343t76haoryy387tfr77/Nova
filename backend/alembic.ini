[alembic]
script_location = alembic
sqlalchemy.url = postgresql+psycopg://neondb_owner:npg_GA0z4sQaMWCB@ep-dry-math-aot0i4y4-pooler.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require

[loggers]
